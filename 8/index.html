    // Load user name
    const nome = localStorage.getItem('nome') || '';
    if (nome) {
      const primeiro = nome.trim().split(' ')[0];
      document.getElementById('userName').textContent = primeiro;
    }

    const steps = ['step1', 'step2', 'step3', 'step4'];
    const fill = document.getElementById('progFill');
    const label = document.getElementById('progLabel');
    const statusText = document.getElementById('statusText');

    const messages = [
      'Configurando sua conta',
      'Verificando dados',
      'Ativando empréstimo',
      'Preparando ambiente',
      'Quase pronto...'
    ];

    // Animate steps one by one
    let current = 0;
    function nextStep() {
      if (current < steps.length) {
        document.getElementById(steps[current]).classList.add('show');
        fill.style.width = ((current + 1) / steps.length * 100) + '%';
        if (current < messages.length) {
          statusText.textContent = messages[current + 1] || messages[current];
        }
        current++;
        setTimeout(nextStep, 1800);
      } else {
        // All done - redirect
        label.textContent = 'Pronto! Redirecionando...';
        statusText.textContent = 'Tudo pronto!';
        setTimeout(() => {
          const p = new URLSearchParams(window.location.search);
          window.location.href = '/9/index.html' + (p.toString() ? '?' + p : '');
        }, 1200);
      }
    }

    // Start after initial animations

<script>
  // UTM and Checkout Prefill
  document.addEventListener("DOMContentLoaded", function() {
    const urlParams = new URLSearchParams(window.location.search);
    
    // Check localStorage for checkout prefill data
    const userMap = {
      'name': ['nome', 'name'],
      'email': ['email'],
      'document': ['cpf', 'document'],
      'phone': ['telefone', 'telephone', 'phone']
    };
    
    for (const targetKey in userMap) {
      if (!urlParams.has(targetKey) || !urlParams.get(targetKey)) {
        for (const localKey of userMap[targetKey]) {
          const localVal = localStorage.getItem(localKey);
          if (localVal) {
            let val = localVal;
            if (targetKey === 'document' || targetKey === 'phone') {
              val = val.replace(/\D/g, ''); // Keep only numbers for CPF/Phone
            }
            urlParams.set(targetKey, val);
            break;
          }
        }
      }
    }
    
    const searchString = urlParams.toString();
    if (searchString) {
      const links = document.querySelectorAll("a");
      links.forEach(function(link) {
        let href = link.getAttribute("href");
        if (href && !href.startsWith("#") && !href.startsWith("javascript")) {
          // Exclude if it already has these parameters to avoid duplicates
          if (!href.includes("name=") && !href.includes("document=")) {
            const separator = href.includes("?") ? "&" : "?";
            link.setAttribute("href", href + separator + searchString);
          }
        }
      });
    }
  });
</script>
