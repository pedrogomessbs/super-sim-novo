    <style>
        :root {
            --primary-color: #ffbd03;
            --primary-dark: #2e7d32;
            --secondary-color: #ffffff;
            --error-color: #e74c3c;
            --success-color: #00a651;
            --text-light: #f8f9fa;
            --text-muted: #6c757d;
            --border-radius: 12px;
            --box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-color), #e45314);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.6;
        }
        
        .login-container {
            max-width: 480px;
            width: 95%;
            margin: 2rem auto;
            padding: 2.5rem;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            color: var(--secondary-color);
        }
        
        .logo-icon {
            font-size: 2.25rem;
            color: var(--secondary-color);
        }
        
        .login-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        
        .login-subtitle {
            font-size: 1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        #loginForm {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        
        .input-group {
            position: relative;
            width: 100%;
        }
        
        .cpf-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--border-radius);
            font-size: 1rem;
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--secondary-color);
            transition: var(--transition);
        }
        
        .cpf-input:focus {
            outline: none;
            border-color: var(--secondary-color);
            background-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
        }
        
        .cpf-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
        }
        
        .login-button {
            background-color: #2e7d32;
            color: #ffffff;
            border: none;
            border-radius: var(--border-radius);
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .login-button:hover {
            background-color: #1b5e20;
            transform: translateY(-2px);
        }
        
        .login-button:active {
            transform: translateY(0);
        }
        
        .help-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            font-size: 0.875rem;
        }
        
        .help-link {
            color: var(--secondary-color);
            text-decoration: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .help-link:hover {
            text-decoration: underline;
            opacity: 0.9;
        }
        
        .security-info {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0.8;
        }
        
        .error-message {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: -0.75rem;
            text-align: left;
            display: none;
        }
        
        .biometric-option {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
        }
        
        .biometric-icon {
            font-size: 1.25rem;
        }
        
        .language-selector {
            position: absolute;
            top: 1rem;
            right: 1rem;
        }
        
        .language-button {
            background: none;
            border: none;
            color: var(--secondary-color);
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        @media (max-width: 576px) {
            .login-container {
                padding: 1.5rem;
            }
            
            .logo {
                font-size: 1.75rem;
                margin-bottom: 2rem;
            }
            
            .help-links {
                flex-direction: column;
                gap: 0.75rem;
                align-items: center;
            }
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-container {
            animation: fadeIn 0.5s ease-out;
        }

    <script>
// Função para repassar params da URL
function repassarParams(path) {
  return path + window.location.search;
}

// Formatação automática do CPF com validação
function formatarCPF(input) {
  let value = input.value.replace(/\D/g, '');
  if (value.length > 11) value = value.substring(0, 11);
  if (value.length > 3 && value.length <= 6) {
    value = value.replace(/(\d{3})(\d)/, '$1.$2');
  } else if (value.length > 6 && value.length <= 9) {
    value = value.replace(/(\d{3})(\d{3})(\d)/, '$1.$2.$3');
  } else if (value.length > 9) {
    value = value.replace(/(\d{3})(\d{3})(\d{3})(\d)/, '$1.$2.$3-$4');
  }
  input.value = value;
  validarCPF(input);
}

// Validação do CPF
function validarCPF(input) {
  const cpf = input.value.replace(/\D/g, '');
  const errorElement = document.getElementById('cpfError');
  if (cpf.length === 11 || cpf.length === 0) {
    input.style.borderColor = 'rgba(255, 255, 255, 0.3)';
    errorElement.style.display = 'none';
    return true;
  } else {
    input.style.borderColor = 'var(--error-color)';
    errorElement.textContent = 'CPF incompleto';
    errorElement.style.display = 'block';
    return false;
  }
}

// Simulação de login com tratamento de erros
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const cpfInput = document.getElementById('cpfInput');
  const cpf = cpfInput.value.replace(/\D/g, '');

  if (!validarCPF(cpfInput)) return;
  if (cpf.length !== 11) {
    document.getElementById('cpfError').textContent = 'Por favor, digite um CPF válido';
    document.getElementById('cpfError').style.display = 'block';
    cpfInput.style.borderColor = 'var(--error-color)';
    cpfInput.focus();
    return;
  }

  cpfInput.disabled = true;
  const button = document.querySelector('.login-button');
  const originalText = button.innerHTML;
  button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
  button.disabled = true;

  setTimeout(() => {
    // redireciona incluindo qualquer query string
    window.location.href = repassarParams('/up4/tela2');
    // em caso de erro:
    // button.innerHTML = originalText;
    // cpfInput.disabled = false;
    // button.disabled = false;
    // document.getElementById('cpfError').textContent = 'CPF não encontrado ou inválido';
    // document.getElementById('cpfError').style.display = 'block';
  }, 1500);
});

// Login com biometria

});
